<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Agenda · CapLink</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#141016;font-family:'Raleway',system-ui,sans-serif;overflow:hidden}
  #stage{position:fixed;inset:0 0 62px 0;overflow:hidden}
  #deck{position:absolute;left:50%;top:50%}
  #deck .sl{position:absolute;top:0;left:0;opacity:0;pointer-events:none;transition:opacity .25s ease;box-shadow:0 26px 80px rgba(0,0,0,.55)}
  #deck .sl.on{opacity:1;pointer-events:auto}
  #bar{position:fixed;left:0;right:0;bottom:0;height:62px;display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(16,12,18,.94);border-top:1px solid rgba(255,255,255,.08)}
  #bar button{font-family:inherit;background:rgba(255,255,255,.08);color:#eee;border:1px solid rgba(255,255,255,.16);border-radius:6px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.03em}
  #bar button:hover{background:rgba(255,255,255,.16)}
  #pg{color:#cfc8d2;font-size:13px;font-weight:600;min-width:70px;text-align:center;font-variant-numeric:tabular-nums}
  #upd{position:fixed;top:12px;right:16px;color:rgba(255,255,255,.45);font-size:11px;letter-spacing:.06em}
  #msg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#cfc8d2;font-size:15px;text-align:center;padding:30px;line-height:1.7}
  /* Print path: on Download PDF we clone every page into #printRoot —
     each clone sits in a true 8.5×11in box, scaled with a transform
     (honoured by every print engine, unlike zoom). */
  #printRoot{display:none}
  #pdfhint{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);z-index:10;background:#fff;color:#241020;
    font-size:13px;line-height:1.55;padding:12px 18px;border-radius:9px;box-shadow:0 12px 40px rgba(0,0,0,.45);
    max-width:440px;text-align:center;display:none}
  #pdfhint b{color:#531639}
  @media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    body{background:#fff;overflow:visible}
    #bar,#upd,#msg,#stage,#pdfhint{display:none!important}
    #printRoot{display:block}
    #printRoot .pg{width:8.5in;height:11in;overflow:hidden;page-break-after:always;break-after:page}
    #printRoot .pg:last-child{page-break-after:auto;break-after:auto}
    #printRoot .sl{position:relative!important;left:0!important;top:0!important;opacity:1!important;
      box-shadow:none!important;transition:none!important;transform:scale(0.816);transform-origin:top left}
    @page{size:8.5in 11in;margin:0}
  }
</style>
</head>
<body>
<div id="msg">Loading the latest agenda…</div>
<div id="stage"><div id="deck"></div></div>
<div id="upd"></div>
<div id="pdfhint">In the print dialog choose <b>Save as PDF</b> and make sure <b>“Background graphics”</b> (Chrome) or <b>“Print backgrounds”</b> (Safari) is ticked — otherwise the browser strips the colours.</div>
<div id="bar" style="display:none">
  <button id="prev">←&ensp;Back</button>
  <span id="pg"></span>
  <button id="next">Next&ensp;→</button>
  <button id="mode"></button>
  <button id="pdf" title="Print or save as PDF">Download PDF</button>
</div>
<script src="./render.js?v=43"></script>
<script>
const SUPA_URL="https://buijepdhgvcfmclztjez.supabase.co";
const SUPA_KEY="sb_publishable_wWAcHfVy2dX0PZoxJ4NgrQ_-QhhFfGg";
const slug=new URLSearchParams(location.search).get("e")||"dubai-2026";
let cur=0,total=0,book=false;const GAPB=16;

function spreads(){return total<=1?total:1+Math.ceil((total-1)/2);}
function autoBook(){const st=document.getElementById("stage");return st.clientWidth>st.clientHeight*1.12;}
function deckW(){return book?2*AgendaRender.W+GAPB:AgendaRender.W;}
function fit(){
  const st=document.getElementById("stage"),deck=document.getElementById("deck");
  deck.style.width=deckW()+"px";deck.style.height=AgendaRender.H+"px";
  const s=Math.min(st.clientWidth/(deckW()+28),st.clientHeight/(AgendaRender.H+24));
  deck.style.transform="translate(-50%,-50%) scale("+s+")";
}
function updateModeBtn(){const b=document.getElementById("mode");if(b)b.textContent=book?"▤ Single page":"📖 Book view";}
function show(i){
  const sl=Array.prototype.slice.call(document.querySelectorAll("#deck .sl"));
  let label="";
  if(!book){
    cur=Math.max(0,Math.min(total-1,i));
    sl.forEach((el,j)=>{el.classList.toggle("on",j===cur);el.style.left="0px";});
    label=(cur+1)+" / "+total;
  }else{
    cur=Math.max(0,Math.min(spreads()-1,i));
    sl.forEach(el=>el.classList.remove("on"));
    if(cur===0){
      sl[0].classList.add("on");sl[0].style.left=((deckW()-AgendaRender.W)/2)+"px";
      label="1 / "+total;
    }else{
      const a=2*cur-1,b=a+1;
      sl[a].classList.add("on");sl[a].style.left="0px";
      label=String(a+1);
      if(b<total){sl[b].classList.add("on");sl[b].style.left=(AgendaRender.W+GAPB)+"px";label+="–"+(b+1);}
      label+=" / "+total;
    }
  }
  document.getElementById("pg").textContent=label;
}
function setBook(v){
  const firstVisible=book?(cur===0?0:2*cur-1):cur;
  book=v;try{localStorage.setItem("agdk-book",v?"1":"0");}catch(_){}
  fit();
  cur=book?(firstVisible===0?0:Math.ceil(firstVisible/2)):firstVisible;
  show(cur);updateModeBtn();
}
async function boot(){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/agendas?slug=eq."+encodeURIComponent(slug)+"&select=data,updated_at",{headers:{apikey:SUPA_KEY}});
    if(!r.ok)throw new Error("could not reach the agenda service ("+r.status+")");
    const rows=await r.json();
    if(!rows.length)throw new Error('No published agenda called "'+slug+'" yet. Ask the CapLink team to publish it.');
    const data=rows[0].data;
    try{await document.fonts.ready;}catch(_){}
    total=AgendaRender.buildDeck(document.getElementById("deck"),data);
    document.title=((data.meta&&data.meta.city)||"")+" Agenda · CapLink";
    const d=new Date(rows[0].updated_at);
    document.getElementById("upd").textContent="Updated "+d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"})+"  ·  v44";
    document.getElementById("msg").style.display="none";
    document.getElementById("bar").style.display="flex";
    let pref=null;try{pref=localStorage.getItem("agdk-book");}catch(_){}
    book=pref===null?autoBook():pref==="1";
    fit();show(0);updateModeBtn();
  }catch(e){
    document.getElementById("msg").textContent=(e&&e.message)||"Could not load the agenda. Please try again.";
  }
}
document.getElementById("prev").onclick=()=>show(cur-1);
document.getElementById("next").onclick=()=>show(cur+1);
/* --- PDF: rendered in-page (pixel-identical to the screen), with the
       browser print dialog only as a fallback --- */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=()=>rej(new Error("could not load "+src));document.head.appendChild(s);});}
async function loadPdfLibs(){
  if(!window.html2canvas)await loadScript("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js");
  if(!window.jspdf)await loadScript("https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js");
}
function printFallback(){
  let pr=document.getElementById("printRoot");
  if(pr)pr.remove();
  pr=document.createElement("div");pr.id="printRoot";
  document.querySelectorAll("#deck .sl").forEach(sl=>{
    const pg=document.createElement("div");pg.className="pg";
    const c=sl.cloneNode(true);
    c.classList.add("on");c.style.left="0px";c.style.top="0px";
    pg.appendChild(c);pr.appendChild(pg);
  });
  document.body.appendChild(pr);
  const hint=document.getElementById("pdfhint");
  hint.innerHTML='In the print dialog choose <b>Save as PDF</b> and make sure <b>“Background graphics”</b> (Chrome) or <b>“Print backgrounds”</b> (Safari) is ticked — otherwise the browser strips the colours.';
  hint.style.display="block";
  setTimeout(()=>window.print(),350);
  setTimeout(()=>{hint.style.display="none";},15000);
}
window.addEventListener("afterprint",()=>{
  const pr=document.getElementById("printRoot");
  if(pr)pr.remove();
  document.getElementById("pdfhint").style.display="none";
});
document.getElementById("pdf").onclick=async()=>{
  const btn=document.getElementById("pdf"),hint=document.getElementById("pdfhint");
  btn.disabled=true;
  let holder=null;
  try{
    hint.textContent="Preparing your PDF…";hint.style.display="block";
    await loadPdfLibs();
    const slides=Array.from(document.querySelectorAll("#deck .sl"));
    holder=document.createElement("div");
    holder.style.cssText="position:fixed;left:-12000px;top:0;width:1000px;z-index:-1";
    document.body.appendChild(holder);
    const pdf=new window.jspdf.jsPDF({orientation:"portrait",unit:"in",format:"letter"});
    for(let i=0;i<slides.length;i++){
      hint.textContent="Building your PDF — page "+(i+1)+" of "+slides.length+"…";
      const c=slides[i].cloneNode(true);
      c.classList.add("on");
      c.style.cssText="position:relative;left:0;top:0;opacity:1;transition:none;box-shadow:none";
      holder.appendChild(c);
      /* the rasteriser doesn't understand CSS zoom (used to fit the
         speakers page) — convert each zoomed block to an equivalent
         transform, pinned to its exact on-screen position */
      const sr=c.getBoundingClientRect();
      c.querySelectorAll("*").forEach(el=>{
        const z=parseFloat(el.style&&el.style.zoom||"");
        if(z&&Math.abs(z-1)>0.001){
          const r=el.getBoundingClientRect();
          el.style.zoom="";
          el.style.left=(r.left-sr.left)+"px";
          el.style.top=(r.top-sr.top)+"px";
          el.style.right="auto";el.style.bottom="auto";
          el.style.width=(r.width/z)+"px";
          el.style.height=(r.height/z)+"px";
          el.style.transform="scale("+z+")";
          el.style.transformOrigin="top left";
        }
      });
      const canvas=await window.html2canvas(c,{scale:2,useCORS:true,backgroundColor:"#ffffff",logging:false});
      if(i>0)pdf.addPage("letter","portrait");
      pdf.addImage(canvas.toDataURL("image/jpeg",0.92),"JPEG",0,0,8.5,11);
      holder.removeChild(c);
    }
    holder.remove();holder=null;
    pdf.save(slug+"-agenda.pdf");
    hint.textContent="PDF downloaded ✓";
    setTimeout(()=>{hint.style.display="none";},4000);
  }catch(err){
    if(holder)holder.remove();
    hint.style.display="none";
    printFallback();
  }finally{btn.disabled=false;}
};
document.getElementById("mode").onclick=()=>setBook(!book);
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key===" ")show(cur+1);if(e.key==="ArrowLeft")show(cur-1);});
let tx=null;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{if(tx==null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>48)show(cur+(dx<0?1:-1));tx=null;},{passive:true});
window.addEventListener("resize",fit);
boot();
</script>
</body>
</html>
