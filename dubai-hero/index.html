*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0b1418;color:#e7edf0;font-family:'Raleway',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:16px;padding:12px 18px;background:#0e1c22;border-bottom:1px solid #17303a;flex:0 0 auto}
header .ttl{font-size:14px;font-weight:700;letter-spacing:.04em}
header .sub{font-size:11.5px;color:#7f9aa3;font-weight:400}
header .spacer{flex:1}
button{font-family:inherit;font-weight:700;font-size:12px;letter-spacing:.06em;border:0;border-radius:7px;padding:10px 16px;cursor:pointer;transition:.15s}
button.primary{background:#D8AD6C;color:#1a1205}
button.primary:hover{background:#e6bd7e}
button.ghost{background:transparent;color:#9fb4bc;border:1px solid #244651}
button.ghost:hover{border-color:#356170;color:#cfe0e6}
main{flex:1;display:flex;min-height:0}
.controls{flex:0 0 320px;overflow-y:auto;padding:16px 16px 60px;background:#0c171c;border-right:1px solid #17303a}
.controls h3{font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#5f7a83;margin:18px 0 8px}
.controls h3:first-child{margin-top:2px}
.ctl{margin-bottom:12px}
.ctl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.ctl label{font-size:12px;color:#b7c8ce;font-weight:500}
.ctl .val{font-size:11px;color:#D8AD6C;font-weight:600;font-variant-numeric:tabular-nums}
.ctl input[type=range]{width:100%;accent-color:#D8AD6C;height:4px;cursor:pointer}
.previewwrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px;background:
  linear-gradient(#0a1216,#0a1216) padding-box,
  repeating-conic-gradient(#10191d 0% 25%,#0c1418 0% 50%) 0/26px 26px}
.stagepad{margin:auto}
.dims{position:fixed;bottom:12px;right:18px;font-size:11px;color:#6c868f;background:#0c171ccc;padding:6px 10px;border-radius:6px;border:1px solid #17303a}

/* ---------------- the hero artboard ---------------- */
#hero{
  --canvasH:1080px; --skyY:40%; --skyX:13%; --skyZoom:1.35;
  --padTop:56px; --lockupW:310px; --blockUp:0px;
  --l1:112px; --l2:56px; --meta:28px; --lbl:20px; --capW:252px;
  --gap1:26px; --gap2:40px; --gap3:52px; --capGap:36px;
  width:1200px;height:var(--canvasH);position:relative;overflow:hidden;font-family:'Raleway',sans-serif;color:#fff;
  background:
    linear-gradient(180deg, rgba(8,20,24,0) 70%, rgba(8,20,24,.7) 88%, #081418 97%, #081418 100%),
    radial-gradient(140% 120% at 50% 8%, rgba(21,44,51,.0) 0%, rgba(21,44,51,.0) 40%, #152C33 66%, #0C1E23 86%, #081418 100%),
    linear-gradient(180deg,#0C2027 0%,#152C33 52%,#0C1E23 80%,#081418 95%,#081418 100%);
  font-variant-numeric:lining-nums tabular-nums;font-feature-settings:'lnum' 1,'tnum' 1;
  text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;font-kerning:normal;}
#hero .sky{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center var(--skyY);
  transform:scale(var(--skyZoom)) translateX(var(--skyX));transform-origin:center;
  filter:brightness(.93) saturate(1.06);
  -webkit-mask-image:linear-gradient(180deg,#000 0%,#000 34%,rgba(0,0,0,.5) 50%,rgba(0,0,0,0) 64%);
          mask-image:linear-gradient(180deg,#000 0%,#000 34%,rgba(0,0,0,.5) 50%,rgba(0,0,0,0) 64%);}
#hero .z{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--padTop) 60px 52px;}
#hero .lockup{width:var(--lockupW);height:auto;object-fit:contain;filter:drop-shadow(0 4px 22px rgba(7,19,21,.6));}
#hero .mid{margin-top:auto;margin-bottom:var(--blockUp);display:flex;flex-direction:column;align-items:center;width:100%;}
#hero .l1{white-space:nowrap;font-size:var(--l1);line-height:1;font-weight:300;letter-spacing:5px;text-transform:uppercase;text-shadow:0 3px 26px rgba(7,19,21,.45);}
#hero .l1 .g{font-weight:600;color:#D8AD6C;}
#hero .l2{white-space:nowrap;margin-top:var(--gap1);font-size:var(--l2);line-height:1;font-weight:600;letter-spacing:6px;text-shadow:0 2px 18px rgba(7,19,21,.5);}
#hero .meta{margin-top:var(--gap2);font-size:var(--meta);line-height:1;font-weight:600;letter-spacing:7px;text-transform:uppercase;color:#C8D4D8;}
#hero .foot{margin-top:var(--gap3);display:flex;flex-direction:column;align-items:center;}
#hero .foot .lbl{font-size:var(--lbl);font-weight:700;letter-spacing:7px;text-transform:uppercase;color:rgba(255,255,255,.7);}
#hero .foot .cap{width:var(--capW);height:auto;margin-top:var(--capGap);object-fit:contain;filter:drop-shadow(0 2px 12px rgba(7,19,21,.45));}
</style>
</head>
<body>
<header>
  <div>
    <div class="ttl">Dubai — Email Hero</div>
    <div class="sub">Slide to position &amp; size, then download the PNG</div>
  </div>
  <div class="spacer"></div>
  <button class="ghost" onclick="resetAll()">Reset</button>
  <button class="primary" id="dl" onclick="dl()">Download PNG</button>
</header>
<main>
  <div class="controls" id="controls"></div>
  <div class="previewwrap">
    <div class="stagepad" id="stagepad">

<div class="dims" id="dims"></div>
<script src="../assets/vendor/modern-screenshot.js"></script>
<script>
const hero=document.getElementById('hero');
// slider config: [key, label, cssVar, min, max, default, type]  type: px | pct | scale
const GROUPS=[
 ['Canvas & layout',[
   ['canvasH','Canvas height','--canvasH',675,1600,1080,'px'],
   ['blockUp','Text block — up / down','--blockUp',0,520,0,'px'],
   ['padTop','Logo — top gap','--padTop',16,260,56,'px'],
 ]],
 ['Sky photo',[
   ['skyY','Sky — vertical','--skyY',0,100,40,'pct'],
   ['skyX','Sky — horizontal','--skyX',-45,45,13,'pct'],
   ['skyZoom','Sky — zoom','--skyZoom',100,190,135,'scale'],
 ]],
 ['Sizes',[
   ['lockupW','Event logo width','--lockupW',170,520,310,'px'],
   ['l1','Headline size','--l1',56,150,112,'px'],
   ['l2','Sub-headline size','--l2',28,84,56,'px'],
   ['meta','Date size','--meta',14,48,28,'px'],
   ['lbl','“Powered by” size','--lbl',12,32,20,'px'],
   ['capW','CapLink logo width','--capW',150,380,252,'px'],
 ]],
 ['Spacing',[
   ['gap1','Gap — headline → sub','--gap1',0,90,26,'px'],
   ['gap2','Gap — sub → date','--gap2',0,110,40,'px'],
   ['gap3','Gap — date → powered by','--gap3',0,140,52,'px'],
   ['capGap','Gap — label → CapLink','--capGap',0,90,36,'px'],
 ]],
];
const DEFAULTS={};
function applyVal(cfg,v){
  const [key,,cssVar,,,,type]=cfg;
  DEFAULTS; // noop
  let out;
  if(type==='pct') out=v+'%';
  else if(type==='scale') out=(v/100).toString();
  else out=v+'px';
  hero.style.setProperty(cssVar,out);
}
function fmt(cfg,v){const t=cfg[6];return t==='pct'?v+'%':t==='scale'?(v/100).toFixed(2)+'×':v+'px';}
const cont=document.getElementById('controls');
GROUPS.forEach(([title,items])=>{
  const h=document.createElement('h3');h.textContent=title;cont.appendChild(h);
  items.forEach(cfg=>{
    const [key,label,cssVar,min,max,def,type]=cfg;
    DEFAULTS[key]=def;
    const wrap=document.createElement('div');wrap.className='ctl';
    wrap.innerHTML='<div class="row"><label>'+label+'</label><span class="val" id="v_'+key+'"></span></div>'+
      '<input type="range" id="r_'+key+'" min="'+min+'" max="'+max+'" value="'+def+'" step="1">';
    cont.appendChild(wrap);
    const r=wrap.querySelector('input'), vv=wrap.querySelector('.val');
    const upd=()=>{applyVal(cfg,+r.value);vv.textContent=fmt(cfg,+r.value);if(key==='canvasH')refit();};
    r.addEventListener('input',upd);
    applyVal(cfg,def);vv.textContent=fmt(cfg,def);
  });
});
function resetAll(){
  GROUPS.forEach(([,items])=>items.forEach(cfg=>{
    const [key,,,,, def]=cfg;const r=document.getElementById('r_'+key);
    r.value=def;applyVal(cfg,def);document.getElementById('v_'+key).textContent=fmt(cfg,def);
  }));
  refit();
}
// preview fit-to-width via zoom (matches the studio tools)
const stage=document.getElementById('stage');
function refit(){
  const wrap=document.querySelector('.previewwrap');
  const avail=wrap.clientWidth-56;
  const z=Math.min(1,avail/1200);
  stage.style.zoom=z;
  const h=parseInt(getComputedStyle(hero).height);
  document.getElementById('dims').textContent='1200 × '+h+' px  (export 2×: '+(2400)+' × '+(h*2)+')';
}
window.addEventListener('resize',refit);
refit();
function dl(){
  const btn=document.getElementById('dl');const o=btn.textContent;btn.textContent='Rendering…';btn.disabled=true;
  const h=parseInt(getComputedStyle(hero).height);
  const zsave=stage.style.zoom;stage.style.zoom=1;
  document.fonts.ready
    .then(()=>modernScreenshot.domToPng(hero,{width:1200,height:h,scale:2,backgroundColor:'#081418'}))
    .then(url=>{const a=document.createElement('a');a.download='dubai-email-hero.png';a.href=url;a.click();})
    .catch(e=>alert('Export failed: '+e))
    .finally(()=>{stage.style.zoom=zsave;btn.textContent=o;btn.disabled=false;});
}
</script>
