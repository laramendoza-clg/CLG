name: Deploy site

# Explicit GitHub Pages deployment: every push to main publishes the site
# and shows up in the Actions tab with a visible pass/fail — no more silent
# throttling like the legacy branch-based Pages builder.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Show github-pages environment config
        run: |
          curl -sS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/environments/github-pages"
          echo "---- pages config ----"
          curl -sS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages"
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Switches the repo's Pages source to "GitHub Actions" on first run
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
