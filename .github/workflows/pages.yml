name: Deploy site

# Keeps GitHub Pages pointed at `main` and explicitly requests a build on
# every push — with a visible pass/fail run. (Historic gotcha: the Pages
# source was once left pointing at a stale branch, silently freezing the
# live site while main moved on.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Point Pages at main
        run: |
          curl -fsS -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"main","path":"/"}}'
      - name: Request a Pages build of main
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
