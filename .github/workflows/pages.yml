name: Deploy site

# The live site (GitHub Pages) publishes from the branch
# `claude/phone-functionality-content-r7yc0s` — changing that source
# setting needs repo-admin rights the workflow token doesn't have.
# So instead: every push to main mirrors main onto that branch and
# explicitly requests a Pages build, with a visible pass/fail run here.
# (If the Pages source is ever repointed to main in Settings → Pages,
# this workflow can be deleted.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to the Pages source branch
        run: git push --force origin HEAD:claude/phone-functionality-content-r7yc0s
      - name: Request a Pages build
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" \
            || echo "Build request not accepted (one may already be queued)"
