name: Deploy site

# Explicit GitHub Pages deployment: every push to main publishes the site
# and shows up in the Actions tab with a visible pass/fail — no more silent
# throttling like the legacy branch-based Pages builder.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # No `environment:` block — while the repo is still on branch-based Pages,
    # the auto-created github-pages environment rejects jobs from custom
    # workflows before configure-pages gets a chance to switch the source.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Switches the repo's Pages source to "GitHub Actions" on first run
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
