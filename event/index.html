<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Event · CapLink Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--plum:#2A1228;--cream:#FAFAFA;--ink:#241020;--line:#e7e1e4;--mute:#9a8f96;--acc:#531639}
*{box-sizing:border-box}
html,body{margin:0;background:var(--cream);color:var(--ink);font-family:'Raleway',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
header{color:#fff;padding:38px 24px 32px;background:radial-gradient(130% 150% at 16% -10%,#42284f 0%,#2A1228 46%,#190b18 100%);border-bottom:3px solid var(--acc)}
.hwrap{max-width:880px;margin:0 auto}
.kick{font-size:10px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.55)}
header h1{margin:8px 0 6px;font-size:27px;font-weight:700;letter-spacing:.01em}
header .meta{font-size:12.5px;font-weight:300;color:rgba(255,255,255,.75);letter-spacing:.06em}
.wrap{max-width:880px;margin:0 auto;padding:26px 22px 50px}
.sec{margin-top:30px}
.sec h2{display:flex;align-items:center;gap:11px;margin:0 0 14px;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--plum)}
.sec h2::after{content:'';flex:1;height:1px;background:var(--line)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
/* secondary tools — deliberately quieter than Agenda/Milestones: a
   compact link list, not full cards */
.sec-tools h2{color:var(--mute)}
.toolrow{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toolrow a,.toolrow .off{display:flex;align-items:baseline;gap:10px;padding:11px 15px;text-decoration:none;color:var(--ink);border-bottom:1px solid #f1ecef;font-size:12.5px}
.toolrow a:last-child,.toolrow .off:last-child{border-bottom:none}
.toolrow a:hover{background:#faf7f9}
.toolrow .tn{font-weight:700;flex:0 0 auto}
.toolrow .td{color:var(--mute);flex:1;min-width:0}
.toolrow .off .tn{color:#8a8088}
.toolrow .off .td{font-style:italic}
a.card,div.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-left:4px solid var(--acc);border-radius:8px;padding:18px 19px 16px;transition:box-shadow .18s,transform .18s}
a.card:hover{box-shadow:0 14px 34px rgba(42,18,40,.15);transform:translateY(-2px)}
.card h3{margin:0 0 5px;font-size:16px;font-weight:700}
.card p{margin:0;font-size:12.5px;line-height:1.55;color:#6b6068;flex:1}
.card .go{margin-top:13px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
div.card.off{border-left-color:var(--line);border-style:dashed;background:transparent}
div.card.off h3{color:#8a8088}
.status{font-size:12px;color:var(--mute);margin:4px 0 0}
.status .live{color:#2e7d4f;font-weight:700}
.back{display:inline-block;margin-top:26px;font-size:12.5px;font-weight:600;color:var(--acc);text-decoration:none}
/* milestones timeline */
.mslist{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.msph{display:flex;justify-content:space-between;align-items:baseline;padding:10px 16px 8px;background:#faf7f9;border-bottom:1px solid #f1ecef;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--acc)}
.msph span:last-child{font-size:10.5px;letter-spacing:.04em;color:var(--mute);font-variant-numeric:tabular-nums}
.ms{display:flex;align-items:baseline;gap:14px;padding:11px 16px;border-bottom:1px solid #f1ecef}
.ms:last-child{border-bottom:none}
.ms .d{flex:0 0 96px;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.ms .wk{flex:0 0 62px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.ms .lb{flex:1;min-width:0}
.ms .lb b{font-size:13.5px;font-weight:600;color:var(--ink)}
.ms .lb span{display:block;font-size:11.5px;color:#8a8088;line-height:1.45;margin-top:1px}
/* editable per-event name on a spotlight email row (e.g. which panel) */
.ms .msname{display:block;width:100%;margin-top:2px;font-family:inherit;font-size:12px;font-weight:600;color:#7a4d0f;line-height:1.4;border:none;background:transparent;padding:2px 5px;border-radius:5px;cursor:text}
.ms .msname:hover{background:#f6eee2}
.ms .msname:focus{outline:1px solid #c9a0bd;background:#fff;color:#241f26}
.ms .msname::placeholder{color:#c0b6bd;font-weight:400;font-style:italic}
.ms .st{flex:0 0 auto;font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:10px}
.ms.past{opacity:.5}
.ms.past .st{background:#efeaed;color:#8a8088}
.ms.soon{background:#fdf6ee}
.ms.soon .st{background:#B7791F;color:#fff}
.ms.soon .d,.ms.soon .lb b{color:#7a4d0f}
.ms.future .st{background:#f1ecef;color:#6b6068}
.ms.nextup{box-shadow:inset 4px 0 0 var(--acc)}
.ms .star{flex:0 0 18px;border:none;background:none;padding:0;font-size:15px;line-height:1;color:#d6cdd2;cursor:pointer;align-self:center}
.ms .star:hover,.ms .star.on{color:#B7791F}
.ms .tick{flex:0 0 20px;width:20px;height:20px;border:2px solid #d6cdd2;border-radius:50%;background:#fff;cursor:pointer;padding:0;font-size:12px;line-height:1;color:#fff;align-self:center}
.ms .tick:hover{border-color:#2e7d4f;background:#eaf4ee}
.ms .tick.on{background:#2e7d4f;border-color:#2e7d4f}
.ms.done .lb b{text-decoration:line-through}
.ms.done .st{background:#e6f2ea;color:#2e7d4f}
.ms .msgo{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);text-decoration:none;padding:4px 9px;border:1px solid var(--line);border-radius:6px;align-self:center}
.ms .msgo:hover{border-color:var(--acc)}
.ms .tr{flex:0 0 76px;font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;text-align:right}
.tr-design{color:#6b2554}.tr-marketing{color:#A15D50}.tr-production{color:#2F5D63}.tr-sales{color:#8A7547}
/* the expand toggle + the quiet "other teams" reference list underneath —
   not a real checklist: no ticks/stars/Go links, just small grey lines */
.msmore{display:block;width:100%;text-align:left;font-family:inherit;font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--mute);background:#faf7f9;border:1px solid var(--line);border-radius:8px;padding:9px 16px;cursor:pointer;margin-top:8px}
.msmore:hover{color:var(--acc);background:#f4eff2}
.msextra{margin-top:2px;padding:6px 4px 2px}
.msextra .mxph{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#b3a8b0;margin:10px 0 4px}
.msextra .mxph:first-child{margin-top:0}
.mx{display:flex;align-items:baseline;gap:10px;padding:3px 0;font-size:11.5px;color:#9a8f96}
.mx .d{flex:0 0 68px;font-variant-numeric:tabular-nums}
.mx .lb{flex:1;min-width:0}
.mx .lb.done{text-decoration:line-through}
.mx .tr{flex:0 0 auto;font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.75}
@media(max-width:640px){
  .ms{flex-wrap:wrap;row-gap:6px;padding:12px 14px}
  .ms .wk{display:none}
  .ms .lb{flex:1 1 100%}
  .ms .tr{text-align:left;margin-right:auto}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header><div class="hwrap">
  <div class="kick">CapLink Studio · Event workspace</div>
  <h1 id="evName">Loading…</h1>
  <div class="meta" id="evMeta"></div>
</div></header>
<div class="wrap">
  <section class="sec">
    <h2>Agenda</h2>
    <div class="grid" id="agGrid"></div>
    <p class="status" id="agStatus"></p>
  </section>
  <section class="sec">
    <h2>Milestones &amp; deadlines</h2>
    <div id="msList" class="mslist"></div>
    <button id="msMoreBtn" class="msmore"></button>
    <div id="msExtra" class="msextra" style="display:none"></div>
    <p class="status" id="msNote"></p>
  </section>
  <section class="sec sec-tools">
    <h2>More tools</h2>
    <div class="toolrow" id="toolRow"></div>
  </section>
  <a class="back" href="../">← All events</a>
</div>
<script src="../assets/milestones.js?v=11"></script>
<script>
const SUPA_URL="https://buijepdhgvcfmclztjez.supabase.co";
const SUPA_KEY="sb_publishable_wWAcHfVy2dX0PZoxJ4NgrQ_-QhhFfGg";
const EVENTS={
  "dubai-2026":{name:"Dubai Private Capital Summit 2026",meta:"September 15, 2026 · The Lana · Dubai",acc:"#2f5d63",social:true},
  "newyork-2026":{name:"New York Private Capital Summit 2026",meta:"October 14, 2026 · WELL& by Durst + Nasdaq · New York",acc:"#A15D50",social:false},
  "ai-data-breakfast-2026":{name:"AI / Data & Insight Private Capital Breakfast 2026",meta:"November 18, 2026 · The May Fair Hotel · London · with PE150",acc:"#8A7547",social:false},
  "europe-2027":{name:"European Private Capital Summit 2027",meta:"February 2027 · London",acc:"#6b2554",social:false},
  "mit-2027":{name:"Private Capital Talent Leadership Summit 2027",meta:"February 24, 2027 · MIT · Cambridge, MA",acc:"#5E1A2E",social:false}
};
const slug=new URLSearchParams(location.search).get("e")||"dubai-2026";
const ev=EVENTS[slug]||{name:slug,meta:"",acc:"#531639",social:false};
document.documentElement.style.setProperty("--acc",ev.acc);
document.getElementById("evName").textContent=ev.name;
document.getElementById("evMeta").textContent=ev.meta;
document.title=ev.name+" · CapLink Studio";
function card(href,title,desc,cta){return '<a class="card" href="'+href+'"><h3>'+title+'</h3><p>'+desc+'</p><span class="go">'+cta+' →</span></a>';}
document.getElementById("agGrid").innerHTML=
  card("../agenda-generator/?e="+encodeURIComponent(slug),"✏️ Edit the agenda","Google-Slides-style editor — click anything on the page to change it. Publish makes it live for everyone.","Open editor")+
  card("../agenda/?e="+encodeURIComponent(slug),"👁 View & share","The live document your guests see — always the newest published version, with built-in PDF download.","Open share link");
function trow(href,name,desc){return '<a href="'+href+'"><span class="tn">'+name+'</span><span class="td">'+desc+'</span></a>';}
document.getElementById("toolRow").innerHTML=
  trow("../sponsor-generator/","Sponsor Section","Build the sponsor roster block for this event's web page.")+
  trow("../logo-sizes/","Sponsor Logo Sizes","The shared size dictionary — check before adding a logo.")+
  (ev.social?
    trow("../dubai-pcs-card/","“I'm Attending” Card","Personalised 1080×1350 attendance card.")+
    trow("../speaker-card/","Speaker &amp; Panel Card","1200×675 announcement card for speakers.")
    :'<div class="off"><span class="tn">Social cards</span><span class="td">Not set up for this event yet — tell Lara when it needs its own.</span></div>');
(function(){
  const M=window.StudioMilestones,s=M&&M.schedule(slug);
  const list=document.getElementById("msList"),note=document.getElementById("msNote");
  const moreBtn=document.getElementById("msMoreBtn"),extra=document.getElementById("msExtra");
  if(!s){list.innerHTML='<div class="ms"><div class="lb"><b>No date set for this event yet</b><span>Add it to assets/milestones.js and the full schedule appears here.</span></div></div>';moreBtn.style.display="none";return;}
  let doneMap={},nameMap={},expanded=false;
  try{expanded=localStorage.getItem("studio-ms-expand")==="1";}catch(_){}
  function escA(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function render(){
    const now=new Date();
    const mineIdx=[],otherIdx=[];
    s.items.forEach((m,i)=>(M.laneHas(m)?mineIdx:otherIdx).push(i));
    let nextIdx=-1;
    mineIdx.forEach(i=>{if(nextIdx<0&&!doneMap[s.items[i].id]&&M.status(s.items[i].date,now)!=="past")nextIdx=i;});

    /* --- mine: the real checklist --- */
    let html="",lastPhase=null,headerHtml=null;
    mineIdx.forEach(i=>{
      const m=s.items[i];
      if(m.phase&&m.phase!==lastPhase){lastPhase=m.phase;headerHtml='<div class="msph"><span>'+m.phase+'</span><span>'+M.fmt(m.date)+'</span></div>';}
      if(headerHtml){html+=headerHtml;headerHtml=null;}
      const done=!!doneMap[m.id];
      const st=done?"done":M.status(m.date,now);
      const cf=done&&M.CONFIRMED&&M.CONFIRMED[m.id];
      const chip=cf?("Sent · "+M.fmt(new Date(cf.at+"T12:00:00"))):(done?"Done ✓":(st==="past"?"Still open":(st==="soon"?"Due soon":"Upcoming")));
      const stCls=done?"past done":(st==="past"?"soon":st);
      const wk=m.w===0?"Event":(m.w<0?(-m.w)+" wk after":m.w+" wk"+(m.w>1?"s":"")+" out");
      /* spotlight emails get an editable "which panel" name that saves */
      const isSpot=/Panel spotlight/.test(m.label||"");
      const lbBody=isSpot
        ?'<input class="msname" data-id="'+m.id+'" placeholder="+ name this panel" value="'+escA(nameMap[m.id]||"")+'">'
        :(m.detail?'<span>'+m.detail+'</span>':'');
      html+='<div class="ms '+stCls+(i===nextIdx?' nextup':'')+'" data-id="'+m.id+'" data-i="'+i+'">'+
        '<button class="star on" title="On your list — click to take it off">★</button>'+
        '<button class="tick'+(done?' on':'')+'" title="'+(done?"Mark as not done":"Mark done")+'">'+(done?"✓":"")+'</button>'+
        '<div class="d">'+M.fmt(m.date)+'</div>'+
        '<div class="wk">'+wk+'</div>'+
        '<div class="lb"><b>'+m.label+'</b>'+lbBody+'</div>'+
        (m.track?'<div class="tr tr-'+m.track+'">'+(M.TRACKS[m.track]||m.track)+'</div>':"")+
        (m.w!==0&&!done?'<a class="msgo" href="'+M.linkFor(slug,m,"../")+'">Go</a>':"")+
        '<div class="st">'+chip+'</div></div>';
    });
    if(!html)html='<div class="ms"><div class="lb"><b>Nothing in your lane for this event yet</b><span>Expand below and star ★ anything that\'s yours.</span></div></div>';
    list.innerHTML=html;
    list.querySelectorAll(".tick").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const id=btn.closest(".ms").dataset.id;
        const nowDone=!doneMap[id];
        if(nowDone)doneMap[id]=1;else delete doneMap[id];
        M.setDone(id,nowDone);
        render();
      });
    });
    list.querySelectorAll(".star").forEach(btn=>{
      btn.addEventListener("click",()=>{
        M.laneToggle(s.items[+btn.closest(".ms").dataset.i]);
        render();
      });
    });
    list.querySelectorAll(".msname").forEach(inp=>{
      inp.addEventListener("change",()=>{        /* fires on blur / Enter */
        const id=inp.dataset.id,v=inp.value.trim();
        if(v)nameMap[id]=v;else delete nameMap[id];
        M.saveLabel(id,v,slug);
      });
    });

    /* --- other teams: quiet reference lines, not a checklist —
       a tiny star is the only interactive bit, to promote something
       onto your own list if it turns out to be yours after all --- */
    moreBtn.style.display=otherIdx.length?"block":"none";
    moreBtn.textContent=expanded?"– Hide other teams' milestones":"+ Show "+otherIdx.length+" more for other teams";
    extra.style.display=expanded?"block":"none";
    if(expanded){
      let xhtml="",xlastPhase=null;
      otherIdx.forEach(i=>{
        const m=s.items[i];
        if(m.phase&&m.phase!==xlastPhase){xlastPhase=m.phase;xhtml+='<div class="mxph">'+m.phase+'</div>';}
        const done=!!doneMap[m.id];
        xhtml+='<div class="mx" data-i="'+i+'">'+
          '<button class="star" style="font-size:11px;color:inherit;opacity:.6" title="Not on your list — click to add it">☆</button>'+
          '<span class="d">'+M.fmt(m.date)+'</span>'+
          '<span class="lb'+(done?' done':'')+'">'+m.label+'</span>'+
          (m.track?'<span class="tr">'+(M.TRACKS[m.track]||m.track)+'</span>':"")+
          '</div>';
      });
      extra.innerHTML=xhtml;
      extra.querySelectorAll(".star").forEach(btn=>{
        btn.addEventListener("click",()=>{
          M.laneToggle(s.items[+btn.closest(".mx").dataset.i]);
          render();
        });
      });
    }
  }
  moreBtn.addEventListener("click",()=>{
    expanded=!expanded;
    try{localStorage.setItem("studio-ms-expand",expanded?"1":"0");}catch(_){}
    render();
  });
  render();
  Promise.all([M.loadDone(),M.loadLabels?M.loadLabels():Promise.resolve({})]).then(res=>{
    doneMap=res[0].done;nameMap=res[1]||{};render();
  });
  note.textContent="The standard event timeline, computed from the event date"+(s.est?" (date is estimated — deadlines shift when the date is confirmed)":"")+". Tick things off as they finish — everyone sees the same ticks. Shown here is just your lane (design + marketing by default) — star ★ anything to add it, or unstar to take it off.";
})();
(async()=>{
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/agendas?slug=eq."+encodeURIComponent(slug)+"&select=updated_at",{headers:{apikey:SUPA_KEY}});
    if(!r.ok)return;
    const rows=await r.json();
    document.getElementById("agStatus").innerHTML=rows.length
      ?'<span class="live">● Live</span> — last published '+new Date(rows[0].updated_at).toLocaleString()
      :"Not published yet — open the editor and hit Publish to make it live.";
  }catch(_){}
})();
</script>
<script src="../assets/studio-nav.js?v=5"></script>
</body>
</html>
