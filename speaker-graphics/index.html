function wrap(text,font,maxw){
 ctx.font=font;
 const words=text.split(/\s+/).filter(Boolean); const lines=[]; let cur='';
 words.forEach(w=>{const t=cur?cur+' '+w:w;
  if(ctx.measureText(t).width<=maxw||!cur)cur=t; else{lines.push(cur);cur=w;}});
 if(cur)lines.push(cur); return lines;
}
function drawLines(lines,font,color,cx,y,lh){
 ctx.font=font;ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='top';
 lines.forEach((l,i)=>ctx.fillText(l,cx,y+i*lh));
}
function coverDraw(img,x,y,w,h){
 const s=Math.max(w/img.width,h/img.height);
 ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
 ctx.drawImage(img,x+(w-img.width*s)/2,y+(h-img.height*s)/2,img.width*s,img.height*s);ctx.restore();
}
function containDraw(img,cx,cy,maxw,maxh){
 const s=Math.min(maxw/img.width,maxh/img.height);
 ctx.drawImage(img,cx-img.width*s/2,cy-img.height*s/2,img.width*s,img.height*s);
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function chip(cx,photoTop,f){
 const t='MODERATOR', ls=4*f, fnt=(21*f)+'px LibBold';
 ctx.font=fnt;
 let tw=0;for(const ch of t)tw+=ctx.measureText(ch).width+ls; tw-=ls;
 const w=tw+40*f,h=38*f,x=cx-w/2,y=photoTop-14*f-h;
 ctx.save();
 ctx.fillStyle='rgba(255,255,255,0.13)';
 rr(x,y,w,h,3*f);ctx.fill();
 ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.6*f;
 rr(x+0.8*f,y+0.8*f,w-1.6*f,h-1.6*f,2.4*f);ctx.stroke();
 ctx.fillStyle='#ffffff';ctx.textBaseline='middle';ctx.textAlign='left';ctx.font=fnt;
 let xx=cx-tw/2;
 for(const ch of t){ctx.fillText(ch,xx,y+h/2+1*f);xx+=ctx.measureText(ch).width+ls;}
 ctx.restore();
}
function placeholder(x,y,w){
 ctx.fillStyle='#d7dadc';ctx.fillRect(x,y,w,w);
 ctx.fillStyle='#bcc2c5';
 ctx.beginPath();ctx.arc(x+w/2,y+w*0.40,w*0.155,0,7);ctx.fill();
 ctx.beginPath();ctx.ellipse(x+w/2,y+w*0.98,w*0.31,w*0.36,0,Math.PI,0);ctx.fill();
}
function speakerCell(sp,idx,x,PT,w){
 const f=w/336, cx=x+w/2, pb=PT+w;
 if(!sp.photoImg && !sp.logoImg && idx<5) ctx.drawImage(imgs.overhangs[idx], x+2*f, pb, 162*f, 37*f);
 if(sp.photoImg) coverDraw(sp.photoImg,x,PT,w,w);
 else if(idx<5) ctx.drawImage(imgs.photos[idx],x,PT,w,w);
 else placeholder(x,PT,w);
 if(sp.logoImg){
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.28)';ctx.shadowBlur=10*f;ctx.shadowOffsetY=4*f;
  ctx.fillStyle='#fff';ctx.fillRect(x+12*f,PT+232*f,137*f,137*f);ctx.restore();
  containDraw(sp.logoImg,x+12*f+68.5*f,PT+232*f+68.5*f,113*f,113*f);
 }
 const maxw=w+40*f;
 let y=pb+36*f;
 const nl=wrap(sp.name,(43*f)+'px LibBold',maxw);
 drawLines(nl,(43*f)+'px LibBold','#fefefe',cx,y,50*f);
 const ry=y+nl.length*50*f+7*f;
 const rl=wrap(sp.role,(30*f)+'px LibReg',maxw);
 drawLines(rl,(30*f)+'px LibReg','rgb(222,226,227)',cx,ry,38*f);
 const cy2=ry+(rl.length-1)*38*f+49*f;
 const cl=wrap(sp.company,(33*f)+'px LibBold',maxw);
 drawLines(cl,(33*f)+'px LibBold','#fefefe',cx,cy2,38*f);
 if(sp.mod) chip(cx,PT,f);
 return cy2+(cl.length)*38*f - PT;  // cell content height from photo top
}
function group(g,fn){

 const cy=g.cy!==undefined?g.cy:g.y+(imgs[g.key]?imgs[g.key].height/2:0);

 fn();ctx.restore();
}

function lsText(t,cx,y,px,ls,color){

 // measure pass for height
 const headH = 210;
 // estimate per-row heights: photo + text worst case; do a dry layout on hidden measure using same fonts
 // simple estimate: run speakerCell math without drawing by measuring wraps
 function cellH(sp){
  const f=P/336, maxw=P+40*f;
  ctx.font=(43*f)+'px LibBold'; const nl=wrap(sp.name,(43*f)+'px LibBold',maxw).length;
  const rl=wrap(sp.role,(30*f)+'px LibReg',maxw).length;
  const cl=wrap(sp.company,(33*f)+'px LibBold',maxw).length;
  return P+36*f+nl*50*f+7*f+(rl-1)*38*f+49*f+cl*38*f;
 }
 const rowH = rows.map(r=>Math.max(...r.map(i=>cellH(SPK[i])))+56);
 const totalH = headH + rowH.reduce((a,b)=>a+b,0) + 30;
 if(cvE.height!==Math.round(totalH)) cvE.height=Math.round(totalH);
 // bg gradient
 const gr=ctx.createLinearGradient(0,0,0,cvE.height);
 gr.addColorStop(0,'rgb(27,52,60)');gr.addColorStop(1,'rgb(16,34,41)');
 ctx.fillStyle=gr;ctx.fillRect(0,0,Wm,cvE.height);
 // heading
 const head=document.getElementById('eHead').value;
 const sub=document.getElementById('eSub').value;
 const tw=lsText(head,600,74,30,10,'rgb(228,233,234)');
 ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(70,90);ctx.lineTo(600-tw/2-40,90);ctx.moveTo(600+tw/2+40,90);ctx.lineTo(1130,90);ctx.stroke();
 if(sub.trim()){ctx.font='22px LibReg';ctx.fillStyle='rgb(160,178,183)';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(sub,600,132);}
 // grid
 let y=headH;
 rows.forEach((r,ri)=>{
  const Rw=r.length*P+(r.length-1)*G;
  const x0=(Wm-Rw)/2;
  r.forEach((idx,k)=>speakerCell(SPK[idx],idx,x0+k*(P+G),y,P));
  y+=rowH[ri];
 });
}
function drawAll(){draw();drawEmail();}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function snippet(){
 const inc=included();
 const head=esc(document.getElementById('eHead').value);
 const sub=esc(document.getElementById('eSub').value);
 const cols = inc.length<=3 ? Math.max(inc.length,1) : (inc.length==4?2:3);
 const cw=Math.floor(600/cols);
 let rowsHtml='';
 for(let i=0;i<inc.length;i+=cols){
  const slice=inc.slice(i,i+cols);
  let cells=slice.map(idx=>{
   const sp=SPK[idx];
   const modTag=sp.mod?`<div style="display:inline-block;border:1px solid rgba(255,255,255,0.55);color:#ffffff;font-size:10px;letter-spacing:2px;padding:3px 8px;margin-bottom:8px;">MODERATOR</div><br>`:'';
   return `<td align="center" valign="top" width="${cw}" style="padding:14px 8px;">
    ${modTag}<img src="REPLACE-WITH-HOSTED-HEADSHOT-URL" alt="${esc(sp.name)}" width="150" height="150" style="display:block;margin:0 auto 12px;background:#d7dadc;">
    <div style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:bold;color:#fefefe;line-height:1.3;">${esc(sp.name)}</div>
    <div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#dee2e3;line-height:1.4;padding-top:3px;">${esc(sp.role)}</div>
    <div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:bold;color:#fefefe;line-height:1.4;padding-top:6px;">${esc(sp.company)}</div>
   </td>`;}).join('\n');
  if(slice.length<cols){const pad=Math.floor((cols-slice.length)*cw/2);cells=`<td width="${pad}">&nbsp;</td>`+cells+`<td width="${pad}">&nbsp;</td>`;}
  rowsHtml+=`<tr>${cells}</tr>\n`;
 }
 return `<!-- CapLink speaker grid -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" align="center" style="background:#16323a;background:linear-gradient(180deg,#1b343c,#102229);">
 <tr><td align="center" style="padding:28px 20px 6px;font-family:Arial,Helvetica,sans-serif;font-size:16px;letter-spacing:5px;color:#e4e9ea;">${head}</td></tr>
 ${sub?`<tr><td align="center" style="padding:0 20px 10px;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#a0b2b7;">${sub}</td></tr>`:''}
 <tr><td style="padding:6px 10px 20px;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
${rowsHtml} </table></td></tr>
</table>`;
}

// tabs
const tabF=document.getElementById('tabF'), tabE=document.getElementById('tabE');
function setTab(email){
 tabF.className=email?'':'act'; tabE.className=email?'act':'';
 document.getElementById('onlyF').style.display=email?'none':'';
 document.getElementById('onlyE').style.display=email?'':'none';
 cvF.style.display=email?'none':'';
 cvE.style.display=email?'':'none';
 drawAll();
}
tabF.onclick=()=>setTab(false);
tabE.onclick=()=>setTab(true);

// speaker cards
const spkDiv=document.getElementById('spk');
SPK.forEach((sp,i)=>{
 const p=document.createElement('div');p.className='panel'+(sp.on?'':' off');
 p.innerHTML=`<h2>Speaker ${i+1}<span class="onoff"><label>show</label><input type="checkbox" data-k="on" ${sp.on?'checked':''}></span></h2>
 <div class="fld"><label>name</label><input type="text" data-k="name" value="${sp.name}"></div>
 <div class="fld"><label>title</label><input type="text" data-k="role" value="${sp.role}"></div>
 <div class="fld"><label>company</label><input type="text" data-k="company" value="${sp.company}"></div>
 <div class="fld"><label>headshot</label><input type="file" accept="image/*" data-k="photo"></div>
 <div class="fld"><label>logo</label><input type="file" accept="image/*" data-k="logo"></div>
 <div class="fld"><label>moderator</label><input type="checkbox" data-k="mod" ${sp.mod?'checked':''}></div>`;
 p.querySelectorAll('input[type=text]').forEach(inp=>inp.oninput=()=>{sp[inp.dataset.k]=inp.value;drawAll();});
 p.querySelector('input[data-k=mod]').onchange=e=>{sp.mod=e.target.checked;drawAll();};
 p.querySelector('input[data-k=on]').onchange=e=>{sp.on=e.target.checked;p.className='panel'+(sp.on?'':' off');drawAll();};
 p.querySelectorAll('input[type=file]').forEach(inp=>inp.onchange=e=>{
  const fl=e.target.files[0];if(!fl)return;
  const img=new Image();img.onload=()=>{if(inp.dataset.k==='photo')sp.photoImg=img;else sp.logoImg=img;drawAll();};
  img.src=URL.createObjectURL(fl);
 });
 spkDiv.appendChild(p);
});
document.getElementById('plogo').onchange=e=>{
 const fl=e.target.files[0];if(!fl)return;
 const img=new Image();img.onload=()=>{partnerLogo=img;draw();};img.src=URL.createObjectURL(fl);
};
document.getElementById('plogoR').onclick=()=>{partnerLogo=null;document.getElementById('plogo').value='';draw();};
['eHead','eSub'].forEach(id=>document.getElementById(id).oninput=()=>drawEmail());

// sliders
const panels=document.getElementById('panels');
GROUPS.forEach(g=>{
 const p=document.createElement('div');p.className='panel';
 p.innerHTML=`<h2>${g.label}<button>reset</button></h2>
 <div class="ctl"><label>up / down</label><input type="range" min="-280" max="280" step="2" value="0"><span>0px</span></div>
 <div class="ctl"><label>size</label><input type="range" min="50" max="160" step="1" value="100"><span>100%</span></div>`;
 const [r1,r2]=p.querySelectorAll('input'),[s1,s2]=p.querySelectorAll('span');
 r1.oninput=()=>{g.dy=+r1.value;s1.textContent=(g.dy>0?'+':'')+g.dy+'px';draw();};
 r2.oninput=()=>{g.s=+r2.value/100;s2.textContent=r2.value+'%';draw();};
 p.querySelector('button').onclick=()=>{g.dy=0;g.s=1;r1.value=0;r2.value=100;s1.textContent='0px';s2.textContent='100%';draw();};
 panels.appendChild(p);
});
document.getElementById('rs').onclick=()=>{
 GROUPS.forEach(g=>{g.dy=0;g.s=1;});
 document.querySelectorAll('#panels .panel').forEach(p=>{const[r1,r2]=p.querySelectorAll('input'),[s1,s2]=p.querySelectorAll('span');r1.value=0;r2.value=100;s1.textContent='0px';s2.textContent='100%';});
 draw();
};
document.getElementById('dl').onclick=()=>{
 cvF.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='flyer.png';a.click();},'image/png');
};
document.getElementById('dlE').onclick=()=>{
 cvE.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='speaker-grid-email.png';a.click();},'image/png');
};
document.getElementById('cpE').onclick=()=>{
 const s=snippet();
 const box=document.getElementById('snipBox');
 box.style.display='block';box.value=s;box.select();
 if(navigator.clipboard) navigator.clipboard.writeText(s).then(()=>{
  document.getElementById('cpE').textContent='Copied';
  setTimeout(()=>document.getElementById('cpE').textContent='Copy HTML snippet',1500);
 });
};
